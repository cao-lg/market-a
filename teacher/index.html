<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教师视图 - 市场数据分析AI伴学平台</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
</head>
<body class="min-h-screen" style="background: var(--bg-primary);">
  
  <!-- Header -->
  <header class="page-header">
    <div class="flex items-center gap-4">
      <button onclick="window.location.href='../index.html'" class="btn btn-ghost">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        返回首页
      </button>
      <h1 class="text-lg font-semibold">教师视图</h1>
    </div>
  </header>

  <!-- Main Content -->
  <main class="page-content">
    <div class="max-w-3xl mx-auto">
      
      <!-- Upload Section -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title flex items-center gap-2">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            上传学习记录
          </h2>
        </div>
        <div class="card-body">
          <p class="text-sm mb-6" style="color: var(--text-secondary);">
            请上传学生导出的JSON格式学习记录文件，教师可以查看学生的学习进度、对话记录和行为分析。
          </p>
          
          <!-- Drop Zone -->
          <div id="drop-zone" class="drop-zone p-8 text-center rounded-lg border-2 border-dashed cursor-pointer transition-all"
               style="border-color: var(--border-color); background: var(--bg-tertiary);"
               ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)"
               onclick="document.getElementById('file-input').click()">
            <svg class="mx-auto mb-4" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <p class="text-base mb-2" style="color: var(--text-primary);">拖拽JSON文件到此处</p>
            <p class="text-sm" style="color: var(--text-tertiary);">或点击选择文件</p>
            <input type="file" id="file-input" class="hidden" accept=".json" onchange="handleFileSelect(event)">
          </div>
          
          <!-- File Preview -->
          <div id="file-preview" class="hidden mt-4 p-4 rounded-lg" style="background: var(--bg-tertiary);">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-3">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-green)" stroke-width="2">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                </svg>
                <div>
                  <div class="font-medium" id="file-name">filename.json</div>
                  <div class="text-sm" style="color: var(--text-tertiary);" id="file-info">学生ID: xxx | 导出时间: xxx</div>
                </div>
              </div>
              <button class="btn btn-primary" onclick="viewRecord()">
                查看详情
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Instructions -->
      <div class="card mt-6">
        <div class="card-header">
          <h3 class="card-title flex items-center gap-2">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-purple)" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 16v-4"/>
              <path d="M12 8h.01"/>
            </svg>
            使用说明
          </h3>
        </div>
        <div class="card-body">
          <div class="space-y-4">
            <div class="flex items-start gap-3">
              <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 font-medium" 
                   style="background: var(--accent-blue); color: white;">1</div>
              <div>
                <h4 class="font-medium mb-1">学生导出数据</h4>
                <p class="text-sm" style="color: var(--text-secondary);">
                  学生在前端点击"导出学习记录"按钮，下载JSON文件
                </p>
              </div>
            </div>
            <div class="flex items-start gap-3">
              <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 font-medium" 
                   style="background: var(--accent-green); color: white;">2</div>
              <div>
                <h4 class="font-medium mb-1">教师上传文件</h4>
                <p class="text-sm" style="color: var(--text-secondary);">
                  将学生提交的JSON文件拖拽或选择上传
                </p>
              </div>
            </div>
            <div class="flex items-start gap-3">
              <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 font-medium" 
                   style="background: var(--accent-purple); color: white;">3</div>
              <div>
                <h4 class="font-medium mb-1">查看学习报告</h4>
                <p class="text-sm" style="color: var(--text-secondary);">
                  全面了解学生学习进度、对话记录、测试成绩和行为分析
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Privacy Notice -->
      <div class="card mt-6" style="background: rgba(88, 166, 255, 0.1); border-color: rgba(88, 166, 255, 0.3);">
        <div class="flex items-start gap-3">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <div>
            <h4 class="font-medium mb-1">隐私说明</h4>
            <p class="text-sm" style="color: var(--text-secondary);">
              所有数据文件仅在本地浏览器中处理，不会上传至任何服务器。教师端完全离线运行，保护学生隐私数据。
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script>
    // Current loaded record
    let currentRecord = null;

    // Drag and drop handlers
    function handleDragOver(e) {
      e.preventDefault();
      e.currentTarget.style.borderColor = 'var(--accent-blue)';
      e.currentTarget.style.background = 'rgba(88, 166, 255, 0.1)';
    }

    function handleDragLeave(e) {
      e.preventDefault();
      e.currentTarget.style.borderColor = 'var(--border-color)';
      e.currentTarget.style.background = 'var(--bg-tertiary)';
    }

    function handleDrop(e) {
      e.preventDefault();
      e.currentTarget.style.borderColor = 'var(--border-color)';
      e.currentTarget.style.background = 'var(--bg-tertiary)';
      
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        processFile(files[0]);
      }
    }

    function handleFileSelect(e) {
      const files = e.target.files;
      if (files.length > 0) {
        processFile(files[0]);
      }
    }

    // Process uploaded file
    function processFile(file) {
      if (!file.name.endsWith('.json')) {
        showToast('error', '文件格式错误', '请上传JSON格式的学习记录文件');
        return;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          
          // Validate format
          if (!data.exportVersion || !data.studentId) {
            throw new Error('无效的学习记录格式');
          }
          
          currentRecord = data;
          
          // Show preview
          document.getElementById('file-preview').classList.remove('hidden');
          document.getElementById('file-name').textContent = file.name;
          document.getElementById('file-info').textContent = 
            `学生ID: ${data.studentId.slice(0, 8)}... | 导出时间: ${new Date(data.exportDate).toLocaleDateString('zh-CN')}`;
          
          showToast('success', '文件加载成功', '点击"查看详情"查看完整报告');
          
        } catch (error) {
          showToast('error', '解析失败', error.message);
        }
      };
      
      reader.readAsText(file);
    }

    // View record
    function viewRecord() {
      if (!currentRecord) {
        showToast('error', '未加载数据', '请先上传学习记录文件');
        return;
      }
      
      // Save to session storage and navigate
      sessionStorage.setItem('teacherRecord', JSON.stringify(currentRecord));
      window.location.href = 'viewer.html';
    }

    // Toast notification
    function showToast(type, title, message) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      const icons = {
        success: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-green)" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
        error: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-red)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
        info: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>'
      };
      
      toast.innerHTML = `
        <div class="toast-icon">${icons[type]}</div>
        <div class="toast-content">
          <div class="toast-title">${title}</div>
          <div class="toast-message">${message}</div>
        </div>
      `;
      
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }
  </script>

  <style>
    .drop-zone:hover {
      border-color: var(--accent-blue) !important;
      background: rgba(88, 166, 255, 0.05) !important;
    }
  </style>
</body>
</html>
