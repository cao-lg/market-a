<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习中心 - 市场数据分析AI伴学平台</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
  <style>
    .learn-layout {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: var(--space-lg);
      height: calc(100vh - 64px);
      padding: var(--space-lg);
      position: relative;
      z-index: 2;
    }

    .learn-content {
      background:
        radial-gradient(ellipse at top right, rgba(212, 140, 82, 0.03) 0%, transparent 50%),
        var(--bg-secondary);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border-color);
      overflow-y: auto;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .learn-content::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
      opacity: 0.4;
      z-index: 1;
    }

    .chat-container {
      position: relative;
      height: 100%;
      border-radius: var(--radius-xl);
    }

    .chat-messages {
      height: calc(100% - 140px);
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-input-area {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 14px 18px;
      background: linear-gradient(180deg, transparent, var(--bg-tertiary) 20%);
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 10px;
    }

    .lesson-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      background:
        linear-gradient(180deg, var(--bg-tertiary), var(--bg-secondary));
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(8px);
    }

    .lesson-nav::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
      opacity: 0.3;
    }

    .lesson-progress-track {
      flex: 1;
      height: 3px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-full);
      margin: 0 16px;
      overflow: hidden;
      position: relative;
    }

    .lesson-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-gold));
      border-radius: var(--radius-full);
      transition: width var(--transition-slow);
      position: relative;
    }

    .lesson-progress-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      animation: shimmer 2s infinite;
    }

    .audio-control-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      background: linear-gradient(180deg, var(--bg-tertiary), var(--bg-secondary));
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 56px;
      z-index: 9;
      backdrop-filter: blur(8px);
    }

    .audio-control-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .audio-control-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .audio-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border-color);
      background: var(--bg-primary);
      color: var(--accent-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .audio-btn:hover {
      background: var(--accent-primary);
      color: var(--bg-primary);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(212, 140, 82, 0.3);
    }

    .audio-btn:active {
      transform: translateY(0);
    }

    .audio-speed-control {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      border-left: 1px solid var(--border-color);
      border-right: 1px solid var(--border-color);
    }

    .audio-speed-label {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      font-family: var(--font-ui);
    }

    .audio-speed-select {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 4px 8px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-family: var(--font-ui);
      cursor: pointer;
      outline: none;
    }

    .audio-speed-select:focus {
      border-color: var(--accent-primary);
    }

    .audio-status {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-family: var(--font-ui);
    }

    .audio-progress {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      font-family: var(--font-mono);
    }

    .markdown-content {
      padding: 48px 64px;
      max-width: 820px;
      margin: 0 auto;
      flex: 1;
    }

    .markdown-content h1 {
      font-size: 2.25rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: none;
      position: relative;
      font-family: var(--font-display);
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .markdown-content h1::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 72px;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-gold));
      border-radius: 2px;
    }

    .markdown-content h2 {
      font-size: 1.65rem;
      font-weight: 600;
      margin-top: 3rem;
      margin-bottom: 1rem;
      font-family: var(--font-display);
      color: var(--text-primary);
      position: relative;
      padding-left: 1rem;
    }

    .markdown-content h2::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.5em;
      width: 4px;
      height: calc(100% - 0.5em);
      background: linear-gradient(180deg, var(--accent-primary), var(--accent-gold));
      border-radius: 2px;
    }

    .markdown-content h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      font-family: var(--font-display);
      color: var(--text-primary);
    }

    .markdown-content p {
      margin-bottom: 1rem;
      line-height: 1.85;
      font-family: var(--font-body);
      color: var(--text-secondary);
      font-size: 1.02rem;
    }

    .markdown-content ul, .markdown-content ol {
      margin-bottom: 1rem;
      padding-left: 1.75rem;
      font-family: var(--font-body);
      color: var(--text-secondary);
    }

    .markdown-content li {
      margin-bottom: 0.5rem;
      line-height: 1.75;
    }

    .markdown-content blockquote {
      border-left: 3px solid var(--accent-primary);
      padding-left: 1.25rem;
      margin: 2rem 0;
      color: var(--text-secondary);
      background: var(--accent-primary-light);
      padding: 1.25rem 1.5rem 1.25rem 2rem;
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      font-family: var(--font-body);
      position: relative;
      font-style: italic;
    }

    .markdown-content blockquote::before {
      content: '"';
      position: absolute;
      top: -2px;
      left: 12px;
      font-size: 3.5rem;
      font-family: var(--font-display);
      color: var(--accent-primary);
      opacity: 0.2;
      line-height: 1;
    }

    .markdown-content table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-bottom: 1.25rem;
      font-size: 0.9rem;
      font-family: var(--font-ui);
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--border-color);
    }

    .markdown-content th, .markdown-content td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border-color);
      text-align: left;
    }

    .markdown-content th {
      background-color: var(--bg-tertiary);
      font-weight: 600;
      color: var(--text-primary);
      font-family: var(--font-ui);
      border-bottom: 2px solid var(--accent-primary);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .markdown-content tr:last-child td {
      border-bottom: none;
    }

    .markdown-content tr:hover td {
      background-color: var(--bg-tertiary);
    }

    .markdown-content code {
      background: var(--bg-tertiary);
      padding: 0.15rem 0.5rem;
      border-radius: var(--radius-sm);
      font-size: 0.85em;
      color: var(--accent-gold);
      border: 1px solid var(--border-color);
      font-family: var(--font-mono);
    }

    .markdown-content pre {
      background: var(--bg-tertiary);
      padding: 1.25rem;
      border-radius: var(--radius-md);
      overflow-x: auto;
      margin-bottom: 1.25rem;
      border: 1px solid var(--border-color);
      position: relative;
    }

    .markdown-content pre::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
      opacity: 0.2;
    }

    .markdown-content pre code {
      background: none;
      padding: 0;
      border: none;
      color: var(--text-primary);
    }

    .content-decoration {
      position: absolute;
      top: 80px;
      right: 40px;
      width: 200px;
      height: 200px;
      pointer-events: none;
      opacity: 0.4;
    }

    .section-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2.5rem 0;
    }

    .section-divider::before,
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-color), transparent);
    }

    .section-divider span {
      font-family: var(--font-display);
      font-size: 0.85rem;
      color: var(--text-tertiary);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .chat-decoration-line {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0.5;
    }

    .chat-decoration-line span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent-primary);
    }

    .chat-decoration-line span:nth-child(2) {
      width: 6px;
      height: 6px;
      background: var(--accent-gold);
    }

    .typing-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-primary);
      animation: typingBounce 1.4s infinite ease-in-out both;
    }

    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes typingBounce {
      0%, 80%, 100% {
        transform: scale(0.6);
        opacity: 0.4;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .fade-in {
      animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hover-lift {
      transition: all var(--transition-normal);
    }

    .hover-lift:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    @media (max-width: 1024px) {
      .learn-layout {
        grid-template-columns: 1fr;
        height: auto;
        padding: var(--space-md);
      }

      .learn-sidebar {
        height: 500px;
      }

      .markdown-content {
        padding: 32px 24px;
      }
    }

    @media (max-width: 768px) {
      .markdown-content {
        padding: 24px 16px;
      }
    }

    .submission-area {
      padding: 0 64px 48px;
      max-width: 820px;
      margin: 0 auto;
      width: 100%;
    }

    @media (max-width: 768px) {
      .submission-area {
        padding: 0 24px 32px;
      }
    }
  </style>
</head>
<body class="min-h-screen" style="background: var(--bg-primary);">

  <!-- Header -->
  <header class="page-header">
    <div class="flex items-center gap-4">
      <button onclick="window.location.href='dashboard.html'" class="btn btn-ghost hover-lift">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        返回
      </button>
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background: linear-gradient(135deg, var(--accent-primary), var(--accent-gold));">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-inverse)" stroke-width="2">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </div>
        <div class="flex flex-col">
          <span class="text-sm font-medium" id="stage-title" style="font-family: var(--font-display); font-size: 0.95rem;">加载中...</span>
          <div class="flex items-center gap-2">
            <span style="color: var(--text-tertiary); font-size: 0.75rem;">/</span>
            <span class="text-sm" id="lesson-title" style="color: var(--text-secondary); font-size: 0.8rem;">--</span>
          </div>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2">
        <span class="agent-mode-indicator" id="agent-mode">
          <span class="agent-mode-icon">🤖</span>
          <span class="agent-mode-badge" id="mode-badge">加载中</span>
        </span>
      </div>
      <button class="btn btn-ghost btn-sm hover-lift" onclick="window.location.href='settings.html'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <div class="learn-layout">
    <!-- Left: Learning Content -->
    <div class="learn-content" id="learn-content">
      <!-- Lesson Navigation -->
      <div class="lesson-nav">
        <button class="btn btn-ghost btn-sm hover-lift" id="prev-btn" onclick="navigateLesson(-1)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </button>
        <span class="text-sm" id="lesson-nav-info" style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-tertiary); min-width: 48px; text-align: center;">1/6</span>
        <button class="btn btn-ghost btn-sm hover-lift" id="next-btn" onclick="navigateLesson(1)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>
        <div class="lesson-progress-track">
          <div class="lesson-progress-bar" id="lesson-progress-bar" style="width: 16%;"></div>
        </div>
        <button class="btn btn-primary btn-sm hover-lift" id="complete-btn" onclick="markComplete()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          完成
        </button>
      </div>

      <!-- Audio Control Bar -->
      <div class="audio-control-bar" id="audio-control-bar" style="display: none;">
        <div class="audio-control-left">
          <button class="audio-btn" id="audio-play-btn" onclick="toggleSpeech()" title="播放/暂停">
            <svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            <svg id="pause-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
              <rect x="6" y="4" width="4" height="16"/>
              <rect x="14" y="4" width="4" height="16"/>
            </svg>
          </button>
          <button class="audio-btn" id="audio-stop-btn" onclick="stopSpeech()" title="停止">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <rect x="4" y="4" width="16" height="16"/>
            </svg>
          </button>
          <div class="audio-speed-control">
            <span class="audio-speed-label">语速</span>
            <select class="audio-speed-select" id="audio-speed" onchange="changeSpeechRate(this.value)">
              <option value="0.7">0.7x</option>
              <option value="0.85">0.85x</option>
              <option value="1.0" selected>1.0x</option>
              <option value="1.15">1.15x</option>
              <option value="1.3">1.3x</option>
            </select>
          </div>
          <span class="audio-status" id="audio-status">点击播放开始朗读</span>
        </div>
        <div class="audio-control-right">
          <span class="audio-progress" id="audio-progress">0:00 / 0:00</span>
        </div>
      </div>

      <!-- Content Area -->
      <div class="markdown-content fade-in" id="content-area">
        <div class="text-center py-12">
          <div class="loading-spinner mx-auto mb-4"></div>
          <p style="color: var(--text-secondary); font-family: var(--font-ui);">加载课程内容...</p>
        </div>
      </div>

      <!-- Submission Area (for practice types) -->
      <div class="submission-area hidden" id="submission-area">
        <div class="submission-box">
          <div class="submission-header">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-md flex items-center justify-center" style="background: var(--accent-primary-light);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2">
                  <path d="M12 20h9"/>
                  <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                </svg>
              </div>
              <span class="submission-title">提交你的答案</span>
            </div>
            <span class="text-sm" style="color: var(--text-tertiary);" id="submission-status"></span>
          </div>
          <textarea class="form-textarea" id="submission-input" rows="6"
                    placeholder="请在这里输入你的答案或分析..."></textarea>
          <div class="flex justify-between items-center mt-3">
            <label class="flex items-center gap-2 text-sm" style="color: var(--text-secondary); font-family: var(--font-ui); cursor: pointer;">
              <input type="checkbox" id="own-work-checkbox" style="accent-color: var(--accent-primary);">
              我已独立完成，没有参考AI回复
            </label>
            <button class="btn btn-primary hover-lift" onclick="submitAnswer()">
              提交给李主管审核
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: AI Chat -->
    <div class="learn-sidebar">
      <div class="chat-container" id="chat-container">
        <!-- Chat Header -->
        <div class="chat-header">
          <div class="chat-avatar">李</div>
          <div class="chat-info">
            <h4>李主管</h4>
            <div class="chat-mode" id="chat-mode">数据助手</div>
          </div>
          <div class="flex-1"></div>
          <div style="display: flex; align-items: center; gap: 6px; margin-right: 8px;">
            <span style="width: 6px; height: 6px; border-radius: 50%; background: var(--accent-success); box-shadow: 0 0 8px var(--accent-success);"></span>
            <span style="font-size: 0.7rem; color: var(--text-tertiary); font-family: var(--font-ui);">在线</span>
          </div>
          <button class="btn btn-ghost btn-sm hover-lift" onclick="clearChat()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
          </button>
        </div>

        <!-- Chat Messages -->
        <div class="chat-messages" id="chat-messages">
          <!-- Messages will be rendered here -->
        </div>

        <!-- Chat Locked Overlay -->
        <div class="chat-locked-overlay hidden" id="chat-locked">
          <div class="lock-icon">🔒</div>
          <p style="color: var(--text-secondary); font-size: 0.9rem; font-family: var(--font-ui);">当前环节AI不可用</p>
          <p style="color: var(--text-tertiary); font-size: 0.75rem; font-family: var(--font-ui);">请独立完成此环节</p>
        </div>

        <!-- Chat Input -->
        <div class="chat-input-area">
          <input type="text" class="chat-input" id="chat-input"
                 placeholder="输入你的问题..." onkeypress="handleChatKeypress(event)">
          <button class="btn btn-primary hover-lift" id="send-btn" onclick="sendMessage()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="../js/db.js"></script>
  <script src="../js/ai.js?v=20250726"></script>
  <script src="../js/agent.js"></script>
  <script src="../js/course-engine.js"></script>
  <script>
    // ==================== State ====================
    let currentStage = null;
    let currentLesson = null;
    let currentMode = 'knowledge';
    let sessionId = '';
    let isStreaming = false;
    let currentStreamController = null;
    let sessionStartTime = null;
    let interactionCount = 0;
    let helpRequestCount = 0;

    // ==================== Initialization ====================
    document.addEventListener('DOMContentLoaded', async () => {
      // Get URL parameters
      const params = new URLSearchParams(window.location.search);
      const stageId = params.get('stage');
      const lessonId = params.get('lesson');
      const urlMode = params.get('mode');
      const examinerState = params.get('examinerState');
      const wrongAnswersParam = params.get('wrongAnswers');

      // Store examiner-specific data
      window.examinerState = examinerState || 'testing';
      window.wrongAnswers = null;

      if (urlMode === 'examiner' && wrongAnswersParam) {
        try {
          window.wrongAnswers = JSON.parse(decodeURIComponent(wrongAnswersParam));
        } catch (e) {
          console.error('Failed to parse wrong answers:', e);
        }
      }

      // Initialize database
      await DB.init();

      // Start session and record start time
      sessionId = await CourseEngine.startSession();
      sessionStartTime = Date.now();
      interactionCount = 0;
      helpRequestCount = 0;

      // Load content
      await loadLessonContent(stageId, lessonId, urlMode);

      // Initialize chat
      await initializeChat(urlMode);
    });

    // ==================== Load Course Content ====================
    async function loadLessonContent(stageId, lessonId, urlMode) {
      const stages = await CourseEngine.getAllStages();

      if (!stageId && stages.length > 0) {
        stageId = stages[0].id;
      }

      currentStage = stages.find(s => s.id === stageId);

      if (!currentStage) {
        showError('课程内容加载失败');
        return;
      }

      // For examiner reviewing mode, we don't need a specific lesson
      if (urlMode === 'examiner' && window.examinerState === 'reviewing') {
        // Set up for examiner reviewing mode
        currentLesson = {
          id: 'examiner-review',
          title: '测试答疑',
          aiEnabled: true
        };

        document.getElementById('stage-title').textContent = currentStage.title;
        document.getElementById('lesson-title').textContent = '测试答疑';

        // Display wrong answers in the content area
        displayWrongAnswers();

        // Set mode to examiner
        currentMode = 'examiner';
        updateModeIndicator();
        return;
      }

      // For simulated test mode, set up the AI test generation interface
      if (urlMode === 'simulatedTest') {
        currentLesson = {
          id: 'simulated-test',
          title: '模拟测试',
          aiEnabled: true
        };

        document.getElementById('stage-title').textContent = '模拟测试';
        document.getElementById('lesson-title').textContent = 'AI出题';

        // Display simulated test interface
        displaySimulatedTestInterface();

        currentMode = 'simulatedTest';
        updateModeIndicator();
        return;
      }

      // Find or set lesson
      if (!lessonId && currentStage.lessons && currentStage.lessons.length > 0) {
        lessonId = currentStage.lessons[0].id;
      }

      currentLesson = currentStage.lessons?.find(l => l.id === lessonId);

      if (!currentLesson) {
        showError('课时内容加载失败');
        return;
      }

      // Update UI
      document.getElementById('stage-title').textContent = currentStage.title;
      document.getElementById('lesson-title').textContent = currentLesson.title;

      // Get lesson type and mode
      const lessonType = currentLesson.type || 'content-reading';
      currentMode = currentLesson.agentMode || 'knowledge';

      // Update mode badge
      const modeInfo = Agent.getModeInfo(currentMode);
      const modeBadge = document.getElementById('mode-badge');
      modeBadge.textContent = modeInfo.name;
      modeBadge.className = `agent-mode-badge ${modeInfo.badgeClass}`;
      document.getElementById('chat-mode').textContent = modeInfo.name;

      // Update navigation
      updateNavigation();

      // Render content based on type
      await renderLessonContent(lessonType);

      // Update chat locked state
      updateChatLockedState();

      // Save last lesson
      await DB.settings.set('lastLesson', {
        stageId: currentStage.id,
        lessonId: currentLesson.id
      });
    }

    // ==================== Render Lesson Content ====================
    async function renderLessonContent(lessonType) {
      const contentArea = document.getElementById('content-area');
      const submissionArea = document.getElementById('submission-area');

      // Hide submission area by default
      submissionArea.classList.add('hidden');

      switch (lessonType) {
        case 'ai-dialog':
          await renderAIDialog();
          break;
        case 'content-reading':
          await renderContentReading();
          break;
        case 'practice':
        case 'variant':
          await renderContentReading();
          submissionArea.classList.remove('hidden');
          break;
        case 'hands-on':
          await renderHandsOn();
          submissionArea.classList.remove('hidden');
          break;
        case 'test':
          await renderTest();
          break;
        default:
          await renderContentReading();
      }
    }

    // Render AI Dialog content
    async function renderAIDialog() {
      const contentArea = document.getElementById('content-area');
      const content = currentLesson.content || {};

      let html = `<div class="markdown-content fade-in">`;

      if (content.intro) {
        html += `<div style="background: linear-gradient(135deg, var(--accent-primary-light), var(--accent-gold-light)); padding: 1.5rem; border-radius: var(--radius-md); margin-bottom: 1.5rem; border: 1px solid var(--border-color); position: relative; overflow: hidden;">
          <div style="position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent-primary), transparent); opacity: 0.5;"></div>
          <p style="color: var(--text-primary); font-weight: 500; font-family: var(--font-ui); margin: 0;">${content.intro}</p>
        </div>`;
      }

      if (content.markdown) {
        html += renderMarkdown(content.markdown);
      }

      // Show understanding questions
      if (content.understandingQuestions && content.understandingQuestions.length > 0) {
        html += `<div style="margin-top: 2rem; padding: 1.5rem; background: var(--accent-teal-light); border-left: 3px solid var(--accent-teal); border-radius: 0 var(--radius-md) var(--radius-md) 0; position: relative;">
          <h4 style="margin-bottom: 0.75rem; font-family: var(--font-display); color: var(--accent-teal); font-size: 1.1rem;">请思考：</h4>
          <ul style="margin: 0; padding-left: 1.25rem;">`;
        content.understandingQuestions.forEach(q => {
          html += `<li style="margin-bottom: 0.5rem; font-family: var(--font-body); color: var(--text-secondary);">${q}</li>`;
        });
        html += `</ul></div>`;
      }

      html += `</div>`;
      contentArea.innerHTML = html;
      
      if (content.markdown) {
        initSpeechControls(content.markdown);
      } else if (content.intro) {
        initSpeechControls(content.intro);
      } else {
        hideSpeechControls();
      }
    }

    // Render Content Reading
    async function renderContentReading() {
      const contentArea = document.getElementById('content-area');
      const content = currentLesson.content || {};

      if (content.markdown) {
        contentArea.innerHTML = `<div class="markdown-content fade-in">${renderMarkdown(content.markdown)}</div>`;
        initSpeechControls(content.markdown);
      } else {
        contentArea.innerHTML = `<div class="markdown-content fade-in"><p>暂无内容</p></div>`;
        hideSpeechControls();
      }
    }

    // ==================== Speech Synthesis (Text-to-Speech) ====================
    let speechAudio = null;
    let speechRate = 1.0;
    let isSpeaking = false;
    let isPaused = false;
    let speechText = '';
    let speechAudioUrl = null;
    let isGenerating = false;

    function cleanMarkdownText(md) {
      let text = md || '';
      text = text.replace(/```[\s\S]*?```/g, '代码块');
      text = text.replace(/`([^`]+)`/g, '$1');
      text = text.replace(/!\[.*?\]\(.*?\)/g, '');
      text = text.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
      text = text.replace(/^#{1,6}\s*/gm, '');
      text = text.replace(/^\s*[-*+]\s+/gm, '');
      text = text.replace(/^\s*\d+\.\s+/gm, '');
      text = text.replace(/^\s*\|.*\|\s*$/gm, '');
      text = text.replace(/<[^>]+>/g, '');
      text = text.replace(/\*\*([^*]+)\*\*/g, '$1');
      text = text.replace(/\*([^*]+)\*/g, '$1');
      text = text.replace(/^---\s*$/gm, '');
      text = text.replace(/^>\s*/gm, '');
      text = text.replace(/\n{3,}/g, '\n\n');
      text = text.replace(/^\s+|\s+$/g, '');
      return text;
    }

    function formatTime(seconds) {
      if (!isFinite(seconds) || seconds < 0) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function estimateDuration(text, rate) {
      const chars = text.length;
      const charsPerSecond = 5 * rate;
      return Math.ceil(chars / charsPerSecond);
    }

    // 预置音色名称映射
    const VOICE_NAMES = {
      anna: 'Anna（温柔女声）',
      alex: 'Alex（磁性男声）'
    };
    let currentVoice = 'anna'; // 默认使用温柔女声

    function initSpeechControls(markdownText) {
      const bar = document.getElementById('audio-control-bar');
      if (!bar) return;

      if (!markdownText || markdownText.trim().length < 20) {
        hideSpeechControls();
        return;
      }

      speechText = cleanMarkdownText(markdownText);
      
      if (speechText.length < 10) {
        hideSpeechControls();
        return;
      }

      bar.style.display = 'flex';
      
      if (speechAudioUrl && speechAudioUrl.startsWith('blob:')) {
        URL.revokeObjectURL(speechAudioUrl);
      }
      speechAudioUrl = null;
      
      // 检查是否有静态音频文件
      if (currentLesson && currentLesson.id) {
        const staticAudioUrl = `../audio/${currentVoice}/${currentLesson.id}.mp3`;
        // 先尝试加载静态文件，如果存在就使用
        checkStaticAudio(staticAudioUrl).then(exists => {
          if (exists) {
            speechAudioUrl = staticAudioUrl;
            document.getElementById('audio-status').textContent = `${VOICE_NAMES[currentVoice]} · 点击播放开始朗读`;
          } else {
            // 没有静态文件，显示系统语音
            const duration = estimateDuration(speechText, speechRate);
            document.getElementById('audio-progress').textContent = `0:00 / ${formatTime(duration)}`;
            document.getElementById('audio-status').textContent = `系统语音 · 全文约${formatTime(duration)}，点击播放开始朗读`;
          }
        });
      } else {
        const duration = estimateDuration(speechText, speechRate);
        document.getElementById('audio-progress').textContent = `0:00 / ${formatTime(duration)}`;
        document.getElementById('audio-status').textContent = `系统语音 · 全文约${formatTime(duration)}，点击播放开始朗读`;
      }
      
      updatePlayPauseIcon();
    }

    async function checkStaticAudio(url) {
      try {
        const response = await fetch(url, { method: 'HEAD' });
        return response.ok;
      } catch {
        return false;
      }
    }

    function hideSpeechControls() {
      const bar = document.getElementById('audio-control-bar');
      if (bar) bar.style.display = 'none';
      stopSpeech();
    }

    function updatePlayPauseIcon() {
      const playIcon = document.getElementById('play-icon');
      const pauseIcon = document.getElementById('pause-icon');
      if (!playIcon || !pauseIcon) return;
      
      if (isSpeaking && !isPaused) {
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
      } else {
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
      }
    }

    function toggleSpeech() {
      if (!speechText) return;

      if (isGenerating) return;

      if (speechAudio && isSpeaking && !isPaused) {
        speechAudio.pause();
        isPaused = true;
        updatePlayPauseIcon();
        document.getElementById('audio-status').textContent = '已暂停';
        return;
      }

      if (speechAudio && isSpeaking && isPaused) {
        speechAudio.play();
        isPaused = false;
        updatePlayPauseIcon();
        document.getElementById('audio-status').textContent = '正在朗读...';
        return;
      }

      startSpeech();
    }

    async function startSpeech() {
      if (!speechText) return;

      stopSpeech();

      // 优先使用静态音频文件
      if (currentLesson && currentLesson.id) {
        const staticAudioUrl = `../audio/${currentVoice}/${currentLesson.id}.mp3`;
        const exists = await checkStaticAudio(staticAudioUrl);
        if (exists) {
          speechAudioUrl = staticAudioUrl;
          playAudioUrl(speechAudioUrl);
          return;
        }
      }

      // 没有静态文件，使用浏览器语音
      startBrowserSpeech();
    }

    function playAudioUrl(url) {
      speechAudio = new Audio(url);
      speechAudio.playbackRate = speechRate;
      
      speechAudio.addEventListener('timeupdate', () => {
        if (speechAudio && speechAudio.duration) {
          document.getElementById('audio-progress').textContent = 
            `${formatTime(speechAudio.currentTime)} / ${formatTime(speechAudio.duration)}`;
        }
      });

      speechAudio.addEventListener('play', () => {
        isSpeaking = true;
        isPaused = false;
        updatePlayPauseIcon();
        document.getElementById('audio-status').textContent = '正在朗读...';
      });

      speechAudio.addEventListener('pause', () => {
        isPaused = true;
        updatePlayPauseIcon();
      });

      speechAudio.addEventListener('ended', () => {
        isSpeaking = false;
        isPaused = false;
        updatePlayPauseIcon();
        document.getElementById('audio-status').textContent = '朗读完成';
        if (speechAudio && speechAudio.duration) {
          document.getElementById('audio-progress').textContent = 
            `${formatTime(speechAudio.duration)} / ${formatTime(speechAudio.duration)}`;
        }
      });

      speechAudio.addEventListener('error', (e) => {
        isSpeaking = false;
        isPaused = false;
        updatePlayPauseIcon();
        document.getElementById('audio-status').textContent = '播放出错，请重试';
        console.error('Audio error:', e);
      });

      speechAudio.play();
    }

    function startBrowserSpeech() {
      if (!window.speechSynthesis) {
        document.getElementById('audio-status').textContent = '浏览器不支持语音';
        return;
      }

      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(speechText);
      utterance.lang = 'zh-CN';
      utterance.rate = speechRate;
      utterance.pitch = 1.0;
      utterance.volume = 1.0;

      const voices = window.speechSynthesis.getVoices();
      const chineseVoice = voices.find(v => 
        v.lang.toLowerCase().includes('zh') || 
        v.lang.toLowerCase().includes('cmn') ||
        v.name.toLowerCase().includes('chinese') ||
        v.name.toLowerCase().includes('中文')
      );
      if (chineseVoice) {
        utterance.voice = chineseVoice;
      }

      utterance.onstart = () => {
        isSpeaking = true;
        isPaused = false;
        updatePlayPauseIcon();
        document.getElementById('audio-status').textContent = '正在朗读（系统语音）...';
      };

      utterance.onend = () => {
        isSpeaking = false;
        isPaused = false;
        updatePlayPauseIcon();
        document.getElementById('audio-status').textContent = '朗读完成';
        const duration = estimateDuration(speechText, speechRate);
        document.getElementById('audio-progress').textContent = `${formatTime(duration)} / ${formatTime(duration)}`;
      };

      utterance.onerror = (e) => {
        isSpeaking = false;
        isPaused = false;
        updatePlayPauseIcon();
        document.getElementById('audio-status').textContent = '朗读出错，请刷新重试';
        console.error('Speech error:', e);
      };

      window.speechSynthesis.speak(utterance);
    }

    function stopSpeech() {
      if (speechAudio) {
        speechAudio.pause();
        speechAudio.currentTime = 0;
        speechAudio = null;
      }
      if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
      }
      isSpeaking = false;
      isPaused = false;
      isGenerating = false;
      updatePlayPauseIcon();
      if (speechText) {
        const statusEl = document.getElementById('audio-status');
        if (statusEl && statusEl.textContent !== '🎙️ 正在生成语音，请稍候...') {
          statusEl.textContent = '已停止，点击播放重新开始';
        }
      }
    }

    function changeSpeechRate(rate) {
      speechRate = parseFloat(rate);
      
      if (speechAudio) {
        speechAudio.playbackRate = speechRate;
      }

      if (speechText) {
        const duration = estimateDuration(speechText, speechRate);
        if (!isSpeaking || !speechAudio) {
          document.getElementById('audio-progress').textContent = `0:00 / ${formatTime(duration)}`;
          document.getElementById('audio-status').textContent = `${getTTSProviderName()} · 全文约${formatTime(duration)}，点击播放开始朗读`;
        }
      }
    }

    // Render Hands-on content (placeholder for now)
    async function renderHandsOn() {
      const contentArea = document.getElementById('content-area');
      const content = currentLesson.content || {};

      let html = `<div class="markdown-content fade-in">`;

      if (content.markdown) {
        html += renderMarkdown(content.markdown);
      }

      html += `<div style="margin-top: 2rem; padding: 2.5rem; background: var(--bg-tertiary); border-radius: var(--radius-lg); text-align: center; border: 1px solid var(--border-color); position: relative; overflow: hidden;">
        <div style="font-size: 3rem; margin-bottom: 1rem;">📊</div>
        <p style="color: var(--text-secondary); font-family: var(--font-ui); margin-bottom: 0.5rem;">在线实操功能 - 表格编辑器</p>
        <p class="text-sm mt-2" style="color: var(--text-tertiary); font-size: 0.8rem; font-family: var(--font-ui);">将在下一阶段集成</p>
      </div>`;

      html += `</div>`;
      contentArea.innerHTML = html;
      
      if (content.markdown) {
        initSpeechControls(content.markdown);
      } else {
        hideSpeechControls();
      }
    }

    // Render Test content
    async function renderTest() {
      const contentArea = document.getElementById('content-area');

      contentArea.innerHTML = `<div class="markdown-content fade-in">
        <h2>阶段测试</h2>
        <p style="color: var(--text-secondary);">正在加载测试题目...</p>
        <div class="text-center py-8">
          <div class="loading-spinner mx-auto"></div>
        </div>
      </div>`;

      // Redirect to test page
      setTimeout(() => {
        window.location.href = `test.html?stage=${currentStage.id}`;
      }, 1000);
    }

    // Simple Markdown Renderer
    function renderMarkdown(md) {
      if (!md) return '';

      return md
        // Headers
        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
        .replace(/^# (.*$)/gim, '<h1>$1</h1>')
        // Bold
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        // Italic
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        // Code blocks
        .replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        // Inline code
        .replace(/`(.*?)`/g, '<code>$1</code>')
        // Lists
        .replace(/^\- (.*$)/gim, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        // Tables (basic)
        .replace(/\|(.+)\|/g, (match) => {
          const cells = match.split('|').filter(c => c.trim());
          if (cells.some(c => /^-+$/.test(c.trim()))) {
            return '';
          }
          return '<tr>' + cells.map(c => `<td>${c.trim()}</td>`).join('') + '</tr>';
        })
        // Paragraphs
        .replace(/\n\n/g, '</p><p>')
        // Line breaks
        .replace(/\n/g, '<br>')
        // Wrap in paragraph
        .replace(/^(.+)$/s, '<p>$1</p>')
        // Clean up
        .replace(/<p><\/p>/g, '')
        .replace(/<p>(<h[1-3]>)/g, '$1')
        .replace(/(<\/h[1-3]>)<\/p>/g, '$1')
        .replace(/<p>(<ul>)/g, '$1')
        .replace(/(<\/ul>)<\/p>/g, '$1')
        .replace(/<p>(<pre>)/g, '$1')
        .replace(/(<\/pre>)<\/p>/g, '$1');
    }

    // ==================== Navigation ====================
    function updateNavigation() {
      const lessons = currentStage.lessons || [];
      const currentIndex = lessons.findIndex(l => l.id === currentLesson?.id);

      document.getElementById('lesson-nav-info').textContent = `${currentIndex + 1}/${lessons.length}`;
      document.getElementById('prev-btn').disabled = currentIndex === 0;
      document.getElementById('next-btn').disabled = currentIndex === lessons.length - 1;

      // Update progress bar
      const progress = ((currentIndex + 1) / lessons.length) * 100;
      const progressBar = document.getElementById('lesson-progress-bar');
      if (progressBar) {
        progressBar.style.width = `${progress}%`;
      }
    }

    function navigateLesson(direction) {
      const lessons = currentStage.lessons || [];
      const currentIndex = lessons.findIndex(l => l.id === currentLesson?.id);
      const newIndex = currentIndex + direction;

      if (newIndex >= 0 && newIndex < lessons.length) {
        const newLesson = lessons[newIndex];
        window.location.href = `learn.html?stage=${currentStage.id}&lesson=${newLesson.id}`;
      }
    }

    // ==================== Chat Functions ====================
    async function initializeChat(urlMode) {
      const chatMessages = document.getElementById('chat-messages');
      chatMessages.innerHTML = '';

      // Special handling for examiner reviewing mode
      if (urlMode === 'examiner' && window.examinerState === 'reviewing') {
        // Add initial message introducing the Q&A session
        const wrongCount = window.wrongAnswers?.length || 0;
        const initialMsg = `【测试答疑环节】

你好！我看到你在测试中有 ${wrongCount} 道题答错了。

不用担心，这正是学习的好机会！现在你可以向我请教这些错题。

📋 答错的题目：
${window.wrongAnswers?.map((q, i) => `${i+1}. ${q.question}`).join('\n') || ''}

请告诉我你想先了解哪道题，或者直接说你想从哪里开始复习？`;

        addMessageToUI({
          role: 'agent',
          content: initialMsg,
          timestamp: Date.now()
        });

        scrollChatToBottom();
        return;
      }

      // Special handling for simulated test mode
      if (urlMode === 'simulatedTest') {
        const initialMsg = `【AI模拟测试】

你好！我是李主管，今天由我来帮你进行模拟测试。

在开始出题之前，我想先了解一下你的学习情况：

2. 哪个阶段你觉得最难理解？
3. 有什么特别想练习的知识点吗？

请告诉我，我会根据你的情况生成合适的练习题。`;

        addMessageToUI({
          role: 'agent',
          content: initialMsg,
          timestamp: Date.now()
        });

        scrollChatToBottom();
        return;
      }

      // Load existing conversations
      const conversations = await DB.conversations.get(sessionId);

      if (conversations && conversations.length > 0) {
        conversations.forEach(conv => addMessageToUI(conv));
      } else {
        // Add initial message based on mode
        const initialMsg = Agent.getInitialMessage(currentMode, currentLesson?.content || {});
        if (initialMsg) {
          addMessageToUI({
            role: 'agent',
            content: initialMsg,
            timestamp: Date.now()
          });
        }
      }

      scrollChatToBottom();
    }

    // Display simulated test interface
    function displaySimulatedTestInterface() {
      const contentArea = document.getElementById('content-area');
      if (!contentArea) return;

      contentArea.innerHTML = `
        <div class="markdown-content fade-in">

            <div class="text-center mb-10">
              <div class="text-5xl mb-4">📋</div>
              <h2 class="text-2xl font-bold mb-3" style="font-family: var(--font-display);">AI模拟测试</h2>
              <p class="text-sm" style="color: var(--text-secondary); font-family: var(--font-ui);">
                李主管将根据你的学习进度，为你生成针对性的练习题
              </p>

            <div class="p-6 rounded-lg mb-6" style="background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-lg);">

                <li class="flex items-start gap-3">

                <li class="flex items-start gap-3">
                  <span style="color: var(--accent-primary); font-weight: 600; min-width: 20px;">2.</span>
                  你需要认真作答，AI会逐题批改并给出详细解析
                </li>
                <li class="flex items-start gap-3">
                  <span style="color: var(--accent-primary); font-weight: 600; min-width: 20px;">3.</span>
                  测试结束后，AI会给出整体评价和改进建议
                </li>
              </ul>
            </div>

            <div class="text-center">
              <p class="text-sm mb-4" style="color: var(--text-tertiary); font-family: var(--font-ui);">
                点击下方按钮，开始与李主管对话
              </p>
              <div class="p-4 rounded-lg" style="background: var(--accent-primary-light); border: 1px solid var(--border-hover); border-radius: var(--radius-md);">
                <p class="text-sm" style="color: var(--text-secondary); font-family: var(--font-ui);">
                  💡 准备好后，直接在对话框中发送消息即可开始
                </p>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // Display wrong answers in the content area
    function displayWrongAnswers() {
      const contentArea = document.getElementById('content-area');
      if (!contentArea || !window.wrongAnswers) return;

      const wrongAnswersHtml = window.wrongAnswers.map((q, index) => {
        const letters = ['A', 'B', 'C', 'D', 'E', 'F'];
        let yourAnswerStr = '';

        if (Array.isArray(q.yourAnswer)) {
          yourAnswerStr = q.yourAnswer.map(i => letters[i]).join('、');
        } else if (typeof q.yourAnswer === 'number') {
          yourAnswerStr = letters[q.yourAnswer];
        } else {
          yourAnswerStr = q.yourAnswer || '未作答';
        }

        return `
          <div class="quiz-question" style="border-left: 3px solid var(--accent-danger);">
            <div class="quiz-question-header">
              <div class="quiz-question-text">
                <span class="mr-2" style="color: var(--text-tertiary); font-family: var(--font-mono);">${index + 1}.</span>
                ${escapeHtml(q.question)}
              </div>
            </div>
            <div class="mt-3 p-4 rounded" style="background: var(--bg-tertiary); border-radius: var(--radius-md);">
              <div class="text-sm mb-2">
                <span style="color: var(--accent-danger);">❌ 你的答案:</span> ${yourAnswerStr}
              </div>
              <div class="text-sm mb-2">
                <span style="color: var(--accent-success);">✅ 正确答案:</span> ${q.correctAnswer}
              </div>
              ${q.explanation ? `
                <div class="text-sm" style="color: var(--text-secondary); line-height: 1.6;">
                  <span style="color: var(--accent-primary);">📝 解析:</span> ${escapeHtml(q.explanation)}
                </div>
              ` : ''}
            </div>
          </div>
        `;
      }).join('');

      contentArea.innerHTML = `
        <div class="markdown-content fade-in">
          <div class="mb-6 p-5 rounded-lg" style="background: var(--accent-primary-light); border: 1px solid var(--border-hover); border-radius: var(--radius-lg);">
            <h3 class="font-semibold mb-2" style="font-family: var(--font-display); font-size: 1.2rem;">📋 测试答疑</h3>
            <p class="text-sm" style="color: var(--text-secondary); font-family: var(--font-ui); line-height: 1.7;">
              以下是你在测试中答错的题目。点击"李主管答疑"按钮可以向他请教解题思路。
            </p>
          </div>
          <div class="flex flex-col gap-4">
            ${wrongAnswersHtml}
          </div>
        </div>
      `;
    }

    function addMessageToUI(message) {
      const chatMessages = document.getElementById('chat-messages');
      const isAgent = message.role === 'agent' || message.role === 'assistant';

      const time = new Date(message.timestamp || Date.now()).toLocaleTimeString('zh-CN', {
        hour: '2-digit',
        minute: '2-digit'
      });

      const div = document.createElement('div');
      div.className = `message ${isAgent ? 'agent' : 'student'}`;
      div.innerHTML = `
        ${escapeHtml(message.content)}
        <div class="message-time">${time}</div>
      `;

      chatMessages.appendChild(div);
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const message = input.value.trim();

      if (!message || isStreaming) return;

      // Check if AI is enabled
      if (!currentLesson?.aiEnabled) {
        showToast('warning', 'AI已禁用', '当前环节需要独立完成');
        return;
      }

      // Track if this is a help request
      const isHelpReq = Agent.isHelpRequest(message);

      // Add user message
      input.value = '';
      addMessageToUI({
        role: 'student',
        content: message,
        timestamp: Date.now()
      });

      // Track interaction
      trackInteraction(isHelpReq);

      // Save to DB
      await DB.conversations.save({
        sessionId,
        stageId: currentStage?.id,
        lessonId: currentLesson?.id,
        role: 'student',
        content: message,
        timestamp: Date.now(),
        mode: currentMode,
        isHelpRequest: isHelpReq
      });

      // Check for help requests in socratic mode
      if (currentMode === 'socratic' && isHelpReq) {
        const count = Agent.incrementHelpRequest(sessionId);
        if (count >= 3) {
          showToast('info', '提示', '你请求帮助次数较多，李主管会给你更多引导');
        }
      }

      scrollChatToBottom();

      // Get response
      await getAIResponse(message);
    }

    async function getAIResponse(userMessage) {
      const sendBtn = document.getElementById('send-btn');
      const input = document.getElementById('chat-input');
      sendBtn.disabled = true;
      input.disabled = true;
      isStreaming = true;

      // Add thinking indicator with better styling
      const chatMessages = document.getElementById('chat-messages');
      const thinkingDiv = document.createElement('div');
      thinkingDiv.className = 'message agent';
      thinkingDiv.id = 'thinking-indicator';
      thinkingDiv.innerHTML = `
        <div style="display: flex; align-items: center; gap: 10px;">
          <span style="font-size: 0.85em; color: var(--text-secondary); font-family: var(--font-ui);">李主管正在思考</span>
          <div class="typing-indicator"><span></span><span></span><span></span></div>
        </div>
      `;
      chatMessages.appendChild(thinkingDiv);
      scrollChatToBottom();

      try {
        // Build messages array
        const conversations = await DB.conversations.get(sessionId, 20);
        const history = Agent.formatConversationHistory(conversations);

        // Build context for AI
        const context = {
          stage: currentStage?.title,
          taskDescription: currentLesson?.title,
          relevantContext: ''
        };

        // Add examiner-specific context
        if (currentMode === 'examiner') {
          context.examinerState = window.examinerState || 'testing';
          if (window.wrongAnswers && context.examinerState === 'reviewing') {
            context.wrongAnswers = window.wrongAnswers.map(q =>
              `题目: ${q.question}\n你的答案: ${q.yourAnswer}\n正确答案: ${q.correctAnswer}\n解析: ${q.explanation}`
            ).join('\n\n');
          }
        }

        const systemPrompt = Agent.getSystemPrompt(currentMode, context);

        const messages = [
          { role: 'system', content: systemPrompt },
          ...history
        ];

        // Create streaming response container
        let fullResponse = '';
        const responseDiv = document.createElement('div');
        responseDiv.className = 'message agent';
        responseDiv.id = 'stream-response';
        chatMessages.appendChild(responseDiv);

        // Remove thinking indicator
        thinkingDiv.remove();

        // Stream response
        await AI.sendChatRequestStream(
          messages,
          {
            onChunk: (chunk, full) => {
              fullResponse = full;
              responseDiv.innerHTML = `
                ${escapeHtml(fullResponse)}
                <div class="message-time" style="opacity: 0.5;">输入中...</div>
              `;
              scrollChatToBottom();
            },
            onComplete: async (full) => {
              fullResponse = full;
              responseDiv.innerHTML = `
                ${escapeHtml(fullResponse)}
                <div class="message-time">${new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })}</div>
              `;

              // Save to DB
              await DB.conversations.save({
                sessionId,
                stageId: currentStage?.id,
                lessonId: currentLesson?.id,
                role: 'agent',
                content: fullResponse,
                timestamp: Date.now(),
                mode: currentMode
              });

              sendBtn.disabled = false;
              input.disabled = false;
              isStreaming = false;
              scrollChatToBottom();
            },
            onError: (error) => {
              thinkingDiv.remove();
              responseDiv.remove();

              if (error.code === 'ABORTED') {
                showToast('info', '已取消', 'AI回复已取消');
              } else if (error.code === 'NO_API_KEY') {
                showToast('error', '未配置API Key', '请先在设置中配置AI API Key');
              } else if (error.code === 'INVALID_KEY') {
                showToast('error', 'API Key无效', '请检查API Key配置是否正确');
              } else if (error.code === 'RATE_LIMIT') {
                showToast('warning', '请求过于频繁', '请稍后再试，或切换其他AI通道');
              } else {
                showToast('error', 'AI响应错误', error.message || '请稍后重试');
              }

              sendBtn.disabled = false;
              input.disabled = false;
              isStreaming = false;
            }
          }
        );

      } catch (error) {
        thinkingDiv.remove();

        if (error.code !== 'ABORTED') {
          showToast('error', '请求失败', error.message || '发生未知错误，请稍后重试');
        }

        sendBtn.disabled = false;
        input.disabled = false;
        isStreaming = false;
      }
    }

    function handleChatKeypress(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    function clearChat() {
      if (confirm('确定要清空对话记录吗？')) {
        DB.conversations.clear(sessionId);
        document.getElementById('chat-messages').innerHTML = '';
        initializeChat();
      }
    }

    function scrollChatToBottom() {
      const chatMessages = document.getElementById('chat-messages');
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // ==================== Chat Locked State ====================
    function updateChatLockedState() {
      const chatLocked = document.getElementById('chat-locked');
      const chatInput = document.getElementById('chat-input');
      const sendBtn = document.getElementById('send-btn');

      if (!currentLesson?.aiEnabled) {
        chatLocked.classList.remove('hidden');
        chatInput.disabled = true;
        sendBtn.disabled = true;
      } else {
        chatLocked.classList.add('hidden');
        chatInput.disabled = false;
        sendBtn.disabled = false;
      }
    }

    // ==================== Submission ====================
    async function submitAnswer() {
      const input = document.getElementById('submission-input');
      const content = input.value.trim();
      const ownWork = document.getElementById('own-work-checkbox').checked;

      if (!content) {
        showToast('warning', '请输入答案', '');
        return;
      }

      // Save submission
      await DB.submissions.save({
        stageId: currentStage?.id,
        lessonId: currentLesson?.id,
        content,
        ownWork,
        timestamp: Date.now()
      });

      showToast('success', '提交成功', '李主管将审核你的答案');

      // If in reviewer mode, show feedback
      if (currentMode === 'reviewer') {
        // Generate feedback
        const feedback = Agent.validateSubmission(content, currentLesson?.rubric);
        addMessageToUI({
          role: 'agent',
          content: `收到你的提交！\n\n评分：${feedback.score}分\n\n${feedback.feedback.join('\n')}`,
          timestamp: Date.now()
        });
      }
    }

    // ==================== Complete Lesson ====================
    async function markComplete() {
      if (!currentLesson) return;

      // Track lesson completion
      trackLessonComplete();

      await CourseEngine.markLessonCompleted(currentStage?.id, currentLesson.id, {
        completedAt: Date.now()
      });

      showToast('success', '已完成', '课时进度已保存');

      // Navigate to next lesson or dashboard
      const nextLesson = await CourseEngine.getNextLesson(currentStage?.id, currentLesson.id);
      if (nextLesson) {
        setTimeout(() => {
          window.location.href = `learn.html?stage=${currentStage.id}&lesson=${nextLesson.id}`;
        }, 1000);
      } else {
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);
      }
    }

    // ==================== Learning Behavior Tracking ====================
    function trackLessonStart() {
      // Track when student starts a lesson
      const trackingData = {
        stageId: currentStage?.id,
        lessonId: currentLesson?.id,
        mode: currentMode,
        sessionId: sessionId,
        startTime: sessionStartTime,
        type: 'lesson_start'
      };

      // Save initial tracking data
      DB.progress.save({
        lessonId: currentLesson?.id,
        stageId: currentStage?.id,
        sessionId: sessionId,
        status: 'in-progress',
        startTime: sessionStartTime,
        mode: currentMode,
        interactionCount: 0,
        helpRequests: 0
      }).catch(console.error);
    }

    function trackInteraction(isHelpRequest = false) {
      interactionCount++;
      if (isHelpRequest) {
        helpRequestCount++;
      }

      // Update metrics in real-time
      DB.progress.save({
        lessonId: currentLesson?.id,
        stageId: currentStage?.id,
        sessionId: sessionId,
        status: 'in-progress',
        interactionCount: interactionCount,
        helpRequests: helpRequestCount,
        lastInteractionAt: Date.now()
      }).catch(console.error);
    }

    function trackLessonComplete() {
      const duration = Date.now() - sessionStartTime;

      // Save final session data
      DB.progress.save({
        lessonId: currentLesson?.id,
        stageId: currentStage?.id,
        sessionId: sessionId,
        status: 'completed',
        completedAt: Date.now(),
        duration: duration,
        totalInteractionCount: interactionCount,
        totalHelpRequests: helpRequestCount,
        completionRate: currentLesson?.aiEnabled ? (interactionCount > 0 ? 1 : 0) : 1
      }).catch(console.error);
    }

    // ==================== Utilities ====================
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showError(message) {
      document.getElementById('content-area').innerHTML = `
        <div class="text-center py-12">
          <p style="color: var(--accent-danger);">${message}</p>
        </div>
      `;
    }

    function showToast(type, title, message) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;

      const icons = {
        success: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-success)" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
        error: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-danger)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
        warning: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-warning)" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
        info: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>'
      };

      toast.innerHTML = `
        <div class="toast-icon">${icons[type]}</div>
        <div class="toast-content">
          <div class="toast-title">${title}</div>
          <div class="toast-message">${message}</div>
        </div>
      `;

      container.appendChild(toast);

      setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) reverse';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }
  </script>
