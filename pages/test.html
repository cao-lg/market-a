<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阶段测试 - 市场数据分析AI伴学平台</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
</head>
<body class="min-h-screen" style="background: var(--bg-primary);">
  
  <!-- Header -->
  <header class="page-header">
    <div class="flex items-center gap-4">
      <button onclick="confirmExit()" class="btn btn-ghost">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        退出
      </button>
      <div class="flex items-center gap-2">
        <span class="text-sm font-medium" id="stage-title">阶段测试</span>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2" style="color: var(--text-secondary);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <span class="text-sm">AI辅助已禁用</span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="page-content">
    <div class="max-w-3xl mx-auto">
      <div id="test-container">
        <!-- Test will be rendered here -->
        <div class="text-center py-12">
          <div class="loading-spinner mx-auto mb-4"></div>
          <p style="color: var(--text-secondary);">正在加载测试...</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Confirm Exit Modal -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">确认退出</h3>
        <button class="modal-close" onclick="closeExitModal()">×</button>
      </div>
      <div class="modal-body">
        <p style="color: var(--text-secondary);">
          确定要退出测试吗？退出后未提交的答案将丢失。
        </p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeExitModal()">继续测试</button>
        <button class="btn btn-danger" onclick="exitTest()">确认退出</button>
      </div>
    </div>
  </div>

  <script src="../js/db.js"></script>
  <script src="../js/course-engine.js"></script>
  <script src="../js/test-engine.js"></script>
  <script>
    // Initialize page
    document.addEventListener('DOMContentLoaded', async () => {
      // Get stage from URL
      const params = new URLSearchParams(window.location.search);
      const stageId = params.get('stage') || 'stage-1';
      
      // Set title
      const stages = await CourseEngine.getAllStages();
      const stage = stages.find(s => s.id === stageId);
      if (stage) {
        document.getElementById('stage-title').textContent = stage.title + ' - 阶段测试';
      }
      
      // Load and render test
      const test = await TestEngine.loadTest(stageId);
      
      if (!test) {
        document.getElementById('test-container').innerHTML = `
          <div class="text-center py-12">
            <p style="color: var(--accent-red);">测试内容加载失败</p>
            <button class="btn btn-secondary mt-4" onclick="window.location.href='dashboard.html'">
              返回仪表盘
            </button>
          </div>
        `;
        return;
      }
      
      TestEngine.renderTest('test-container');
    });

    // Confirm exit
    function confirmExit() {
      document.getElementById('confirm-modal').classList.remove('hidden');
    }

    function closeExitModal() {
      document.getElementById('confirm-modal').classList.add('hidden');
    }

    function exitTest() {
      // Stop timer if running
      if (window.testTimer) {
        clearInterval(window.testTimer);
      }
      window.location.href = 'dashboard.html';
    }

    // Show toast
    function showToast(type, title, message) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      const icons = {
        success: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-green)" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
        error: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-red)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
        warning: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-orange)" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
        info: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>'
      };
      
      toast.innerHTML = `
        <div class="toast-icon">${icons[type]}</div>
        <div class="toast-content">
          <div class="toast-title">${title}</div>
          <div class="toast-message">${message}</div>
        </div>
      `;
      
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // Handle page unload
    window.addEventListener('beforeunload', (e) => {
      // Only warn if test is in progress
      if (document.getElementById('test-container')?.querySelector('.quiz-question')) {
        e.preventDefault();
        e.returnValue = '';
      }
    });
  </script>
</body>
</html>
