<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>电商转化漏斗模型</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Lora:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; overflow: hidden;">
  <div
    data-composition-id="conversion-funnel"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="14"
    data-track-index="0"
    style="
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background: #0d1117;
    "
  >
    <div class="bg-gradient" data-layout-ignore style="
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 80%, rgba(90, 158, 143, 0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 20%, rgba(212, 140, 82, 0.04) 0%, transparent 50%);
    "></div>

    <div class="grain-overlay" data-layout-ignore style="
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    "></div>

    <div class="scene-content" style="
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
      padding: 60px 100px;
      gap: 0;
      box-sizing: border-box;
      position: relative;
      z-index: 1;
    ">
      <div class="header-section" style="
        text-align: center;
        margin-bottom: 40px;
      ">
        <div class="eyebrow" style="
          font-family: 'Inter', sans-serif;
          font-size: 16px;
          font-weight: 500;
          letter-spacing: 0.3em;
          text-transform: uppercase;
          color: #5a9e8f;
          margin-bottom: 12px;
          opacity: 0;
        ">
          CONVERSION FUNNEL
        </div>
        <h1 class="main-title" style="
          font-family: 'Playfair Display', serif;
          font-size: 56px;
          font-weight: 700;
          color: #f5f5f5;
          line-height: 1.2;
          margin: 0 0 12px 0;
          letter-spacing: -0.02em;
          opacity: 0;
        ">
          电商用户转化漏斗
        </h1>
        <div class="title-underline" style="
          width: 70px;
          height: 3px;
          background: linear-gradient(90deg, #5a9e8f, #7ab8a8);
          margin: 0 auto;
          opacity: 0;
          transform: scaleX(0);
        "></div>
        <p class="subtitle" style="
          font-family: 'Lora', serif;
          font-size: 22px;
          color: #8b949e;
          margin-top: 16px;
          font-style: italic;
          opacity: 0;
        ">
          从曝光到成交的每一步流失，都是增长的机会点
        </p>
      </div>

      <div class="funnel-container" style="
        display: flex;
        gap: 80px;
        flex: 1;
        width: 100%;
        max-width: 1600px;
      ">
        <div class="funnel-visual" style="
          flex: 1;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          position: relative;
        ">
          <div class="funnel-stage f1" style="
            width: 100%;
            max-width: 700px;
            height: 90px;
            background: linear-gradient(135deg, rgba(212, 140, 82, 0.3), rgba(212, 140, 82, 0.1));
            border: 1.5px solid rgba(212, 140, 82, 0.5);
            border-radius: 8px 8px 4px 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            box-sizing: border-box;
            margin-bottom: 8px;
            opacity: 0;
            transform: scaleX(0.5);
            position: relative;
          ">
            <div class="stage-label" style="
              font-family: 'Inter', sans-serif;
              font-size: 18px;
              font-weight: 600;
              color: #f5f5f5;
            ">
              👁️ 商品曝光
            </div>
            <div class="stage-value" style="
              font-family: 'Playfair Display', serif;
              font-size: 24px;
              font-weight: 700;
              color: #d48c52;
            ">
              <span class="counter">0</span> 次
            </div>
          </div>

          <div class="funnel-arrow" style="
            width: 0;
            height: 0;
            border-left: '100px solid transparent';
            border-right: '100px solid transparent';
            opacity: 0.3;
            margin: 4px 0;
          "></div>

          <div class="funnel-stage f2" style="
            width: 88%;
            max-width: 616px;
            height: 90px;
            background: linear-gradient(135deg, rgba(230, 180, 85, 0.3), rgba(230, 180, 85, 0.1));
            border: 1.5px solid rgba(230, 180, 85, 0.5);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            box-sizing: border-box;
            margin-bottom: 8px;
            opacity: 0;
            transform: scaleX(0.5);
          ">
            <div class="stage-label" style="
              font-family: 'Inter', sans-serif;
              font-size: 18px;
              font-weight: 600;
              color: #f5f5f5;
            ">
              👆 商品点击
            </div>
            <div class="stage-value" style="
              font-family: 'Playfair Display', serif;
              font-size: 24px;
              font-weight: 700;
              color: #e6b455;
            ">
              <span class="counter">0</span> 次
            </div>
          </div>

          <div class="funnel-arrow" style="
            opacity: 0.3;
            margin: 4px 0;
          "></div>

          <div class="funnel-stage f3" style="
            width: 76%;
            max-width: 532px;
            height: 90px;
            background: linear-gradient(135deg, rgba(90, 158, 143, 0.3), rgba(90, 158, 143, 0.1));
            border: 1.5px solid rgba(90, 158, 143, 0.5);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            box-sizing: border-box;
            margin-bottom: 8px;
            opacity: 0;
            transform: scaleX(0.5);
          ">
            <div class="stage-label" style="
              font-family: 'Inter', sans-serif;
              font-size: 18px;
              font-weight: 600;
              color: #f5f5f5;
            ">
              🛒 加入购物车
            </div>
            <div class="stage-value" style="
              font-family: 'Playfair Display', serif;
              font-size: 24px;
              font-weight: 700;
              color: #5a9e8f;
            ">
              <span class="counter">0</span> 次
            </div>
          </div>

          <div class="funnel-arrow" style="
            opacity: 0.3;
            margin: 4px 0;
          "></div>

          <div class="funnel-stage f4" style="
            width: 64%;
            max-width: 448px;
            height: 90px;
            background: linear-gradient(135deg, rgba(176, 135, 181, 0.3), rgba(176, 135, 181, 0.1));
            border: 1.5px solid rgba(176, 135, 181, 0.5);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            box-sizing: border-box;
            margin-bottom: 8px;
            opacity: 0;
            transform: scaleX(0.5);
          ">
            <div class="stage-label" style="
              font-family: 'Inter', sans-serif;
              font-size: 18px;
              font-weight: 600;
              color: #f5f5f5;
            ">
              📝 创建订单
            </div>
            <div class="stage-value" style="
              font-family: 'Playfair Display', serif;
              font-size: 24px;
              font-weight: 700;
              color: #b087b5;
            ">
              <span class="counter">0</span> 单
            </div>
          </div>

          <div class="funnel-arrow" style="
            opacity: 0.3;
            margin: 4px 0;
          "></div>

          <div class="funnel-stage f5" style="
            width: 52%;
            max-width: 364px;
            height: 90px;
            background: linear-gradient(135deg, rgba(90, 158, 143, 0.4), rgba(90, 158, 143, 0.15));
            border: 2px solid rgba(122, 184, 168, 0.6);
            border-radius: 4px 4px 8px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            box-sizing: border-box;
            opacity: 0;
            transform: scaleX(0.5);
            box-shadow: 0 0 30px rgba(122, 184, 168, 0.2);
          ">
            <div class="stage-label" style="
              font-family: 'Inter', sans-serif;
              font-size: 18px;
              font-weight: 600;
              color: #f5f5f5;
            ">
              💳 支付成功
            </div>
            <div class="stage-value" style="
              font-family: 'Playfair Display', serif;
              font-size: 24px;
              font-weight: 700;
              color: #7ab8a8;
            ">
              <span class="counter">0</span> 单
            </div>
          </div>
        </div>

        <div class="funnel-insights" style="
          width: 380px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          gap: 20px;
        ">
          <div class="insight-card c1" style="
            padding: 24px 28px;
            background: rgba(26, 31, 40, 0.8);
            border: 1px solid rgba(212, 140, 82, 0.2);
            border-radius: 12px;
            opacity: 0;
            transform: translateX(30px);
          ">
            <div class="insight-header" style="
              display: flex;
              align-items: center;
              gap: 12px;
              margin-bottom: 12px;
            ">
              <div class="insight-icon" style="
                width: 40px;
                height: 40px;
                border-radius: 8px;
                background: rgba(212, 140, 82, 0.15);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
              ">
                🔻
              </div>
              <span style="
                font-family: 'Inter', sans-serif;
                font-size: 14px;
                font-weight: 600;
                color: #d48c52;
                letter-spacing: 0.05em;
              ">
                点击率
              </span>
            </div>
            <div style="
              font-family: 'Playfair Display', serif;
              font-size: 32px;
              font-weight: 700;
              color: #f5f5f5;
              margin-bottom: 8px;
            ">
              <span class="pct-counter">0</span>%
            </div>
            <p style="
              font-family: 'Lora', serif;
              font-size: 14px;
              color: #8b949e;
              margin: 0;
              line-height: 1.6;
            ">
              曝光到点击的转化，主图和价格是关键影响因素
            </p>
          </div>

          <div class="insight-card c2" style="
            padding: 24px 28px;
            background: rgba(26, 31, 40, 0.8);
            border: 1px solid rgba(90, 158, 143, 0.2);
            border-radius: 12px;
            opacity: 0;
            transform: translateX(30px);
          ">
            <div class="insight-header" style="
              display: flex;
              align-items: center;
              gap: 12px;
              margin-bottom: 12px;
            ">
              <div class="insight-icon" style="
                width: 40px;
                height: 40px;
                border-radius: 8px;
                background: rgba(90, 158, 143, 0.15);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
              ">
                🛒
              </div>
              <span style="
                font-family: 'Inter', sans-serif;
                font-size: 14px;
                font-weight: 600;
                color: #5a9e8f;
                letter-spacing: 0.05em;
              ">
                加购率
              </span>
            </div>
            <div style="
              font-family: 'Playfair Display', serif;
              font-size: 32px;
              font-weight: 700;
              color: #f5f5f5;
              margin-bottom: 8px;
            ">
              <span class="pct-counter">0</span>%
            </div>
            <p style="
              font-family: 'Lora', serif;
              font-size: 14px;
              color: #8b949e;
              margin: 0;
              line-height: 1.6;
            ">
              详情页说服力和商品吸引力直接影响加购意愿
            </p>
          </div>

          <div class="insight-card c3" style="
            padding: 24px 28px;
            background: rgba(26, 31, 40, 0.8);
            border: 1px solid rgba(122, 184, 168, 0.2);
            border-radius: 12px;
            opacity: 0;
            transform: translateX(30px);
          ">
            <div class="insight-header" style="
              display: flex;
              align-items: center;
              gap: 12px;
              margin-bottom: 12px;
            ">
              <div class="insight-icon" style="
                width: 40px;
                height: 40px;
                border-radius: 8px;
                background: rgba(122, 184, 168, 0.15);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
              ">
                ✅
              </div>
              <span style="
                font-family: 'Inter', sans-serif;
                font-size: 14px;
                font-weight: 600;
                color: #7ab8a8;
                letter-spacing: 0.05em;
              ">
                支付转化率
              </span>
            </div>
            <div style="
              font-family: 'Playfair Display', serif;
              font-size: 32px;
              font-weight: 700;
              color: #f5f5f5;
              margin-bottom: 8px;
            ">
              <span class="pct-counter">0</span>%
            </div>
            <p style="
              font-family: 'Lora', serif;
              font-size: 14px;
              color: #8b949e;
              margin: 0;
              line-height: 1.6;
            ">
              最终成交转化，运费、优惠、支付体验影响支付率
            </p>
          </div>

          <div class="insight-summary" style="
            margin-top: 8px;
            padding: 20px 24px;
            background: linear-gradient(135deg, rgba(212, 140, 82, 0.1), rgba(90, 158, 143, 0.1));
            border: 1px solid rgba(212, 140, 82, 0.2);
            border-radius: 12px;
            opacity: 0;
          ">
            <p style="
              font-family: 'Lora', serif;
              font-size: 16px;
              color: #d48c52;
              margin: 0;
              font-style: italic;
              line-height: 1.7;
            ">
              "漏斗每提升1%，<br>GMV就能带来数倍增长"
            </p>
          </div>
        </div>
      </div>
    </div>

    <div class="corner-tl" data-layout-ignore style="
      position: absolute;
      top: 40px;
      left: 80px;
      width: 32px;
      height: 32px;
      border-top: 1.5px solid #5a9e8f;
      border-left: 1.5px solid #5a9e8f;
      opacity: 0.4;
    "></div>
    <div class="corner-tr" data-layout-ignore style="
      position: absolute;
      top: 40px;
      right: 80px;
      width: 32px;
      height: 32px;
      border-top: 1.5px solid #5a9e8f;
      border-right: 1.5px solid #5a9e8f;
      opacity: 0.4;
    "></div>
    <div class="corner-bl" data-layout-ignore style="
      position: absolute;
      bottom: 40px;
      left: 80px;
      width: 32px;
      height: 32px;
      border-bottom: 1.5px solid #5a9e8f;
      border-left: 1.5px solid #5a9e8f;
      opacity: 0.4;
    "></div>
    <div class="corner-br" data-layout-ignore style="
      position: absolute;
      bottom: 40px;
      right: 80px;
      width: 32px;
      height: 32px;
      border-bottom: 1.5px solid #5a9e8f;
      border-right: 1.5px solid #5a9e8f;
      opacity: 0.4;
    "></div>

    <!-- Audio narration -->
    <audio id="narration" preload="auto" style="display:none;">
      <source src="narrations/conversion-funnel-narration.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      
      // Audio sync with animation
      const audio = document.getElementById('narration');
      if (audio) {
        audio.addEventListener('loadeddata', () => {
          tl.call(() => audio.play(), null, 0.2);
        });
        audio.addEventListener('ended', () => {
          tl.pause();
        });
      }

      tl.to(".eyebrow", { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.3);
      tl.to(".main-title", { opacity: 1, duration: 0.8, ease: "power3.out" }, 0.5);
      tl.to(".title-underline", { opacity: 1, scaleX: 1, duration: 0.6, ease: "power2.inOut" }, 1.0);
      tl.to(".subtitle", { opacity: 1, duration: 0.6, ease: "power2.out" }, 1.2);

      const stages = [".f1", ".f2", ".f3", ".f4", ".f5"];
      const stageDelays = [1.8, 2.4, 3.0, 3.6, 4.2];
      
      stages.forEach((stage, i) => {
        tl.to(stage, {
          opacity: 1,
          scaleX: 1,
          duration: 0.6,
          ease: "back.out(1.3)",
        }, stageDelays[i]);
      });

      const funnelValues = [100000, 12000, 3500, 1600, 1120];
      const counters = document.querySelectorAll(".funnel-stage .counter");
      counters.forEach((counter, i) => {
        const obj = { val: 0 };
        tl.to(obj, {
          val: funnelValues[i],
          duration: 1.2,
          ease: "power2.out",
          onUpdate: function() {
            counter.textContent = Math.floor(obj.val).toLocaleString();
          }
        }, stageDelays[i] + 0.3);
      });

      tl.to(".c1", { opacity: 1, x: 0, duration: 0.6, ease: "power3.out" }, 3.0);
      tl.to(".c2", { opacity: 1, x: 0, duration: 0.6, ease: "power3.out" }, 3.4);
      tl.to(".c3", { opacity: 1, x: 0, duration: 0.6, ease: "power3.out" }, 3.8);

      const pctValues = [12.0, 29.2, 70.0];
      const pctCounters = document.querySelectorAll(".pct-counter");
      pctCounters.forEach((counter, i) => {
        const obj = { val: 0 };
        tl.to(obj, {
          val: pctValues[i],
          duration: 1.0,
          ease: "power2.out",
          onUpdate: function() {
            counter.textContent = obj.val.toFixed(1);
          }
        }, 3.5 + i * 0.3);
      });

      tl.to(".insight-summary", { opacity: 1, duration: 0.8, ease: "power2.out" }, 5.5);

      tl.to(".f5", {
        boxShadow: "0 0 40px rgba(122, 184, 168, 0.4)",
        duration: 0.6,
        ease: "sine.inOut",
        yoyo: true,
        repeat: 2,
      }, 7.5);

      tl.to(".insight-card", {
        y: -4,
        duration: 0.4,
        ease: "sine.inOut",
        yoyo: true,
        repeat: 1,
        stagger: { each: 0.15, from: "start" }
      }, 9.5);

      window.__timelines["conversion-funnel"] = tl;

      (function autoPlay() {
        if (window.__hyperframes_playing) return;
        if (typeof gsap !== "undefined") {
          tl.play();
        } else {
          setTimeout(autoPlay, 100);
        }
      })();
    </script>
  </div>
</body>
</html>
