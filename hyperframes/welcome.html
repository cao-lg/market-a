<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>市场数据分析 - AI Agent 伴学平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; overflow: hidden;">
  <div
    data-composition-id="welcome"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="8"
    data-track-index="0"
    style="
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background: #0d1117;
    "
  >
    <div class="bg-gradient" data-layout-ignore style="
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 30%, rgba(212, 140, 82, 0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 70%, rgba(230, 180, 85, 0.06) 0%, transparent 50%);
    "></div>

    <div class="grain-overlay" data-layout-ignore style="
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E\");
    "></div>

    <div class="top-rule" data-layout-ignore style="
      position: absolute;
      top: 80px;
      left: 160px;
      right: 160px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212, 140, 82, 0.3), transparent);
    "></div>

    <div class="bottom-rule" data-layout-ignore style="
      position: absolute;
      bottom: 80px;
      left: 160px;
      right: 160px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212, 140, 82, 0.3), transparent);
    "></div>

    <div class="scene-content" style="
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      padding: 120px 160px;
      gap: 0;
      box-sizing: border-box;
      position: relative;
      z-index: 1;
    ">
      <div class="logo-wrap" style="
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 48px;
      ">
        <div class="logo-mark" style="
          width: 64px;
          height: 64px;
          border: 2px solid #d48c52;
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          position: relative;
        ">
          <div class="logo-inner" style="
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #d48c52, #e6b455);
            border-radius: 50%;
          "></div>
          <div class="logo-ring" style="
            position: absolute;
            inset: -8px;
            border: 1px solid rgba(230, 180, 85, 0.2);
            border-radius: 50%;
          "></div>
        </div>
        <div class="logo-text" style="
          font-family: 'Playfair Display', serif;
          font-size: 28px;
          font-weight: 600;
          color: #e6b455;
          letter-spacing: 0.05em;
        ">
          MarketInsight
        </div>
      </div>

      <h1 class="main-title" style="
        font-family: 'Playfair Display', serif;
        font-size: 120px;
        font-weight: 700;
        color: #f5f5f5;
        line-height: 1.1;
        text-align: center;
        margin: 0 0 24px 0;
        letter-spacing: -0.02em;
      ">
        市场数据分析
      </h1>

      <div class="title-underline" style="
        width: 120px;
        height: 3px;
        background: linear-gradient(90deg, #d48c52, #e6b455);
        margin-bottom: 40px;
      "></div>

      <h2 class="subtitle" style="
        font-family: 'Lora', serif;
        font-size: 44px;
        font-weight: 400;
        color: #d48c52;
        text-align: center;
        margin: 0 0 80px 0;
        font-style: italic;
        letter-spacing: 0.02em;
      ">
        AI Agent 伴学平台
      </h2>

      <div class="decorative-line" style="
        display: flex;
        align-items: center;
        gap: 24px;
        margin-bottom: 80px;
      ">
        <div class="deco-diamond" style="
          width: 8px;
          height: 8px;
          background: #e6b455;
          transform: rotate(45deg);
        "></div>
        <div class="deco-line" style="
          width: 80px;
          height: 1px;
          background: rgba(230, 180, 85, 0.4);
        "></div>
        <div class="deco-diamond" style="
          width: 8px;
          height: 8px;
          background: #e6b455;
          transform: rotate(45deg);
        "></div>
        <div class="deco-line" style="
          width: 80px;
          height: 1px;
          background: rgba(230, 180, 85, 0.4);
        "></div>
        <div class="deco-diamond" style="
          width: 8px;
          height: 8px;
          background: #e6b455;
          transform: rotate(45deg);
        "></div>
      </div>

      <div class="features" style="
        display: flex;
        gap: 100px;
        margin-bottom: 80px;
      ">
        <div class="feature-item" style="
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 16px;
        ">
          <div class="feature-number" style="
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 700;
            color: #e6b455;
            line-height: 1;
            font-variant-numeric: tabular-nums;
          ">
            64
          </div>
          <div class="feature-label" style="
            font-family: 'Lora', serif;
            font-size: 22px;
            color: #a0a0a0;
            letter-spacing: 0.05em;
          ">
            课时精研
          </div>
          <div class="feature-divider" style="
            width: 40px;
            height: 1px;
            background: rgba(212, 140, 82, 0.3);
            margin-top: 4px;
          "></div>
        </div>

        <div class="feature-divider-v" style="
          width: 1px;
          height: 100px;
          background: linear-gradient(180deg, transparent, rgba(212, 140, 82, 0.2), transparent);
          align-self: center;
        "></div>

        <div class="feature-item" style="
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 16px;
        ">
          <div class="feature-number" style="
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 700;
            color: #e6b455;
            line-height: 1;
            font-variant-numeric: tabular-nums;
          ">
            6
          </div>
          <div class="feature-label" style="
            font-family: 'Lora', serif;
            font-size: 22px;
            color: #a0a0a0;
            letter-spacing: 0.05em;
          ">
            学习阶段
          </div>
          <div class="feature-divider" style="
            width: 40px;
            height: 1px;
            background: rgba(212, 140, 82, 0.3);
            margin-top: 4px;
          "></div>
        </div>

        <div class="feature-divider-v" style="
          width: 1px;
          height: 100px;
          background: linear-gradient(180deg, transparent, rgba(212, 140, 82, 0.2), transparent);
          align-self: center;
        "></div>

        <div class="feature-item" style="
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 16px;
        ">
          <div class="feature-number" style="
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            font-weight: 700;
            color: #e6b455;
            line-height: 1.2;
          ">
            AI
          </div>
          <div class="feature-label" style="
            font-family: 'Lora', serif;
            font-size: 22px;
            color: #a0a0a0;
            letter-spacing: 0.05em;
          ">
            智能伴学
          </div>
          <div class="feature-divider" style="
            width: 40px;
            height: 1px;
            background: rgba(212, 140, 82, 0.3);
            margin-top: 4px;
          "></div>
        </div>
      </div>

      <div class="cta-wrap" style="
        position: relative;
      ">
        <div class="cta-glow" style="
          position: absolute;
          inset: -20px -40px;
          background: radial-gradient(ellipse at center, rgba(212, 140, 82, 0.15) 0%, transparent 70%);
          filter: blur(20px);
        "></div>
        <div class="cta-button" style="
          position: relative;
          padding: 24px 64px;
          border: 2px solid #d48c52;
          border-radius: 2px;
          background: rgba(212, 140, 82, 0.05);
        ">
          <span class="cta-text" style="
            font-family: 'Lora', serif;
            font-size: 28px;
            font-weight: 600;
            color: #e6b455;
            letter-spacing: 0.08em;
            white-space: nowrap;
          ">
            开始你的学习之旅
          </span>
        </div>
        <div class="cta-arrow" style="
          position: absolute;
          right: -50px;
          top: 50%;
          transform: translateY(-50%);
          font-size: 24px;
          color: #e6b455;
        ">
          →
        </div>
      </div>
    </div>

    <div class="corner-tl" data-layout-ignore style="
      position: absolute;
      top: 60px;
      left: 140px;
      width: 40px;
      height: 40px;
      border-top: 2px solid #d48c52;
      border-left: 2px solid #d48c52;
      opacity: 0.5;
    "></div>
    <div class="corner-tr" data-layout-ignore style="
      position: absolute;
      top: 60px;
      right: 140px;
      width: 40px;
      height: 40px;
      border-top: 2px solid #d48c52;
      border-right: 2px solid #d48c52;
      opacity: 0.5;
    "></div>
    <div class="corner-bl" data-layout-ignore style="
      position: absolute;
      bottom: 60px;
      left: 140px;
      width: 40px;
      height: 40px;
      border-bottom: 2px solid #d48c52;
      border-left: 2px solid #d48c52;
      opacity: 0.5;
    "></div>
    <div class="corner-br" data-layout-ignore style="
      position: absolute;
      bottom: 60px;
      right: 140px;
      width: 40px;
      height: 40px;
      border-bottom: 2px solid #d48c52;
      border-right: 2px solid #d48c52;
      opacity: 0.5;
    "></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.set(".logo-mark, .logo-text", { opacity: 0, y: 20 });
      tl.set(".main-title", { opacity: 0, y: 40 });
      tl.set(".title-underline", { scaleX: 0, transformOrigin: "center" });
      tl.set(".subtitle", { opacity: 0, y: 30 });
      tl.set(".deco-diamond, .deco-line", { opacity: 0, scale: 0 });
      tl.set(".feature-item", { opacity: 0, y: 40 });
      tl.set(".feature-divider-v", { opacity: 0, scaleY: 0 });
      tl.set(".cta-wrap", { opacity: 0, y: 30 });
      tl.set(".corner-tl, .corner-tr, .corner-bl, .corner-br", { opacity: 0 });
      tl.set(".top-rule, .bottom-rule", { opacity: 0 });
      tl.set(".bg-gradient", { opacity: 0 });

      tl.to(".bg-gradient", { opacity: 1, duration: 1.5, ease: "power2.inOut" }, 0);
      tl.to(".top-rule, .bottom-rule", { opacity: 1, duration: 1, ease: "power2.out" }, 0.2);
      tl.to(".corner-tl", { opacity: 0.5, duration: 0.6, ease: "power2.out" }, 0.3);
      tl.to(".corner-tr", { opacity: 0.5, duration: 0.6, ease: "power2.out" }, 0.4);
      tl.to(".corner-bl", { opacity: 0.5, duration: 0.6, ease: "power2.out" }, 0.5);
      tl.to(".corner-br", { opacity: 0.5, duration: 0.6, ease: "power2.out" }, 0.6);

      tl.to(".logo-mark", { opacity: 1, y: 0, duration: 0.8, ease: "back.out(1.2)" }, 0.8);
      tl.to(".logo-text", { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" }, 1.0);

      tl.to(".main-title", { opacity: 1, y: 0, duration: 1, ease: "power3.out" }, 1.5);

      tl.to(".title-underline", { scaleX: 1, duration: 0.8, ease: "power2.inOut" }, 2.2);

      tl.to(".subtitle", { opacity: 1, y: 0, duration: 0.8, ease: "power2.out" }, 2.6);

      tl.to(".deco-diamond:nth-child(1)", { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.5)" }, 3.2);
      tl.to(".deco-line:nth-child(2)", { opacity: 1, scale: 1, duration: 0.5, ease: "power2.out" }, 3.3);
      tl.to(".deco-diamond:nth-child(3)", { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.5)" }, 3.5);
      tl.to(".deco-line:nth-child(4)", { opacity: 1, scale: 1, duration: 0.5, ease: "power2.out" }, 3.6);
      tl.to(".deco-diamond:nth-child(5)", { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.5)" }, 3.8);

      tl.to(".feature-item:nth-child(1)", { opacity: 1, y: 0, duration: 0.7, ease: "back.out(1)" }, 4.2);
      tl.to(".feature-divider-v:nth-child(2)", { opacity: 1, scaleY: 1, duration: 0.5, ease: "power2.out" }, 4.5);
      tl.to(".feature-item:nth-child(3)", { opacity: 1, y: 0, duration: 0.7, ease: "back.out(1)" }, 4.6);
      tl.to(".feature-divider-v:nth-child(4)", { opacity: 1, scaleY: 1, duration: 0.5, ease: "power2.out" }, 4.9);
      tl.to(".feature-item:nth-child(5)", { opacity: 1, y: 0, duration: 0.7, ease: "back.out(1)" }, 5.0);

      tl.to(".feature-number", {
        scale: 1.1,
        duration: 0.3,
        ease: "power2.out",
        yoyo: true,
        repeat: 1,
        stagger: { each: 0.1, from: "start" }
      }, 5.6);

      tl.to(".cta-wrap", { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" }, 6.2);

      tl.to(".cta-glow", {
        scale: 1.1,
        opacity: 0.8,
        duration: 1,
        ease: "sine.inOut",
        yoyo: true,
        repeat: 1
      }, 6.8);

      tl.to(".cta-arrow", {
        x: 10,
        duration: 0.6,
        ease: "power2.inOut",
        yoyo: true,
        repeat: 1
      }, 7.0);

      window.__timelines["welcome"] = tl;
    </script>
  </div>
</body>
</html>
