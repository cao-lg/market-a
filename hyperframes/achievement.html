    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.to(".bg-radial", { opacity: 1, duration: 1.5, ease: "power2.out" }, 0);

      tl.set(".particle", { xPercent: -50, yPercent: -50 });

      const particlePositions = [
        { angle: -80, distance: 250, delay: 0.1 },
        { angle: -50, distance: 300, delay: 0.15 },
        { angle: -20, distance: 220, delay: 0.05 },
        { angle: 10, distance: 280, delay: 0.2 },
        { angle: 40, distance: 260, delay: 0.12 },
        { angle: 70, distance: 320, delay: 0.08 },
        { angle: 100, distance: 240, delay: 0.18 },
        { angle: 130, distance: 290, delay: 0.1 },
        { angle: 160, distance: 270, delay: 0.22 },
        { angle: 190, distance: 310, delay: 0.14 },
        { angle: 220, distance: 230, delay: 0.06 },
        { angle: 250, distance: 280, delay: 0.16 },
        { angle: 280, distance: 260, delay: 0.2 },
        { angle: 310, distance: 300, delay: 0.09 },
        { angle: -100, distance: 250, delay: 0.11 },
        { angle: -70, distance: 290, delay: 0.17 },
        { angle: -40, distance: 270, delay: 0.07 },
        { angle: -10, distance: 310, delay: 0.13 },
        { angle: 20, distance: 240, delay: 0.19 },
        { angle: 50, distance: 280, delay: 0.21 },
      ];

      for (let i = 0; i < 20; i++) {
        const p = particlePositions[i];
        const rad = (p.angle * Math.PI) / 180;
        const tx = Math.cos(rad) * p.distance;
        const ty = Math.sin(rad) * p.distance;
        tl.to(`.p${i + 1}`, {
          opacity: 1,
          x: tx,
          y: ty,
          duration: 0.8,
          ease: "power2.out",
        }, p.delay);
        tl.to(`.p${i + 1}`, {
          opacity: 0,
          y: ty + 50,
          duration: 0.6,
          ease: "power2.in",
        }, p.delay + 0.9);
      }

      tl.to(".light-rays", { opacity: 0.6, duration: 0.8, ease: "power2.out" }, 0.3);
      tl.to(".light-rays", { rotation: 360, duration: 5, ease: "none" }, 0.3);
      tl.to(".light-rays", { opacity: 0, duration: 1, ease: "power2.in" }, 4);

      tl.to(".trophy-glow", { opacity: 1, duration: 1, ease: "power2.out" }, 0.5);
      tl.to(".trophy-glow", { scale: 1.3, duration: 2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 0.8);

      tl.to(".trophy-medal", {
        opacity: 1,
        scale: 1,
        duration: 0.8,
        ease: "back.out(1.5)",
      }, 1);

      tl.to(".ribbon-left", {
        opacity: 1,
        rotation: -15,
        duration: 0.6,
        ease: "back.out(1.2)",
      }, 1.2);
      tl.to(".ribbon-right", {
        opacity: 1,
        rotation: 15,
        duration: 0.6,
        ease: "back.out(1.2)",
      }, 1.3);

      tl.to(".trophy-medal", {
        y: -10,
        duration: 0.8,
        ease: "sine.inOut",
        yoyo: true,
        repeat: 2,
      }, 1.8);

      tl.to(".achievement-title", {
        opacity: 1,
        y: 0,
        duration: 0.8,
        ease: "power3.out",
      }, 1.8);

      tl.to(".title-ornament", {
        opacity: 1,
        duration: 0.6,
        ease: "power2.out",
      }, 2.2);
      tl.from(".ornament-line", { scaleX: 0, duration: 0.6, ease: "power2.out" }, 2.2);
      tl.from(".ornament-diamond", { scale: 0, rotation: 45, duration: 0.5, ease: "back.out(1.5)" }, 2.3);

      tl.to(".stat-item:nth-child(1)", {
        opacity: 1,
        y: 0,
        duration: 0.6,
        ease: "back.out(1)",
      }, 3.5);
      tl.to(".stat-divider:nth-child(2)", {
        opacity: 1,
        duration: 0.5,
        ease: "power2.out",
      }, 3.7);
      tl.to(".stat-item:nth-child(3)", {
        opacity: 1,
        y: 0,
        duration: 0.6,
        ease: "back.out(1)",
      }, 3.8);
      tl.to(".stat-divider:nth-child(4)", {
        opacity: 1,
        duration: 0.5,
        ease: "power2.out",
      }, 4.0);
      tl.to(".stat-item:nth-child(5)", {
        opacity: 1,
        y: 0,
        duration: 0.6,
        ease: "back.out(1)",
      }, 4.1);

      tl.from(".stat-number", {
        textContent: 0,
        duration: 1,
        ease: "power2.out",
        snap: { textContent: 1 },
        stagger: 0.15,
      }, 4.0);

      tl.to(".encouragement", {
        opacity: 1,
        y: 0,
        duration: 0.7,
        ease: "power2.out",
      }, 5);

      tl.to(".trophy-medal", {
        scale: 1.05,
        duration: 0.5,
        ease: "sine.inOut",
        yoyo: true,
        repeat: 1,
      }, 5.2);

      window.__timelines["achievement"] = tl;
    </script>
  </div>
</body>
</html>
